name: Deploy to Cloudflare

# Publica os 3 alvos na Cloudflare quando há push na main:
#   - worker  (Workers): ingestor + persistor + aggregator + bindings
#   - dashboard (Pages): painel interno (D1 binding)
#   - site      (Pages): site público (R2 binding)
#
# Cada job só roda se o package dele (ou um package do qual depende) mudou.
# workflow_dispatch força o deploy dos 3, independente do diff.
#
# Secrets necessários (Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN  — token com permissões de account:
#     Workers Scripts:Edit, Cloudflare Pages:Edit, D1:Edit,
#     Workers R2 Storage:Edit, Queues:Edit, Account Settings:Read
#   CLOUDFLARE_ACCOUNT_ID — id da conta (wrangler whoami mostra)
on:
  push:
    branches: [main]
    paths:
      - 'packages/worker/**'
      - 'packages/dashboard/**'
      - 'packages/site/**'
      - 'packages/schema/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker:
              - 'packages/worker/**'
              - 'packages/schema/**'
              - 'packages/shared/**'
            dashboard:
              - 'packages/dashboard/**'
            site:
              - 'packages/site/**'

  worker:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.worker == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # lê packageManager do package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck (gate)
        run: pnpm turbo run typecheck --filter @etus/telemetry-worker
      - name: Apply D1 migrations (remote)
        run: pnpm --filter @etus/telemetry-worker run db:migrate:remote
      - name: Deploy worker
        run: pnpm --filter @etus/telemetry-worker run deploy

  dashboard:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.dashboard == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build (next-on-pages)
        run: pnpm --filter @etus/telemetry-dashboard run build:pages
      - name: Ensure Pages project exists
        run: |
          NAME=etus-telemetry-dashboard
          if ! pnpm --filter @etus/telemetry-dashboard exec wrangler pages project list 2>/dev/null | grep -q "$NAME"; then
            pnpm --filter @etus/telemetry-dashboard exec wrangler pages project create "$NAME" --production-branch=main
          fi
      - name: Deploy to Pages
        run: pnpm --filter @etus/telemetry-dashboard exec wrangler pages deploy --branch=main

  site:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.site == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build (next-on-pages)
        run: pnpm --filter @etus/telemetry-site run build:pages
      - name: Ensure Pages project exists
        run: |
          NAME=etus-telemetry-site
          if ! pnpm --filter @etus/telemetry-site exec wrangler pages project list 2>/dev/null | grep -q "$NAME"; then
            pnpm --filter @etus/telemetry-site exec wrangler pages project create "$NAME" --production-branch=main
          fi
      - name: Deploy to Pages
        run: pnpm --filter @etus/telemetry-site exec wrangler pages deploy --branch=main
