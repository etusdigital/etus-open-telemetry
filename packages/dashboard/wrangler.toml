# Wrangler config para o dashboard rodando em Cloudflare Pages.
# Em dev local, o setupDevPlatform() do next.config.mjs lê este arquivo
# e expõe as bindings em `getRequestContext().env`.

name = "etus-telemetry-dashboard"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# D1 — o MESMO database do worker. Em dev, o wrangler usa o mesmo
# arquivo SQLite local (.wrangler/state/v3/d1) compartilhado entre os
# dois packages.
[[d1_databases]]
binding = "DB"
database_name = "etus-telemetry"
database_id = "f7895604-d27e-4a15-b321-f3e6911c75cf"

# R2 público — necessário para o purge/reject/disable removerem o JSON
# publicado (stats/v1/<slug>.json) na hora, sem esperar o aggregator.
[[r2_buckets]]
binding = "R2_PUBLIC"
bucket_name = "etus-telemetry-public"
